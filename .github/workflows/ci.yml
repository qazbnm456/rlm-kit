name: CI

on:
  push:
    branches: [main]
  pull_request:

# Action versions (checkout@v4, setup-uv@v5) are current majors; bump if a newer
# major ships. CI needs no live model, no vLLM, no network, no Deno: the
# dspy-bearing tests use a DummyLM or skip when dspy is absent.

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run tests
        run: uv run --group dev python -m pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint
        run: uvx ruff check .
